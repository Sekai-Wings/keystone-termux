name: Build Termux Keystone DEB (arm64)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-termux-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Keystone Source
        uses: actions/checkout@v4
        with:
          repository: 'keystone-engine/keystone'
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build dpkg

      - name: Build and Package DEB for aarch64
        run: |
          VERSION="0.9.2"
          DEB_ARCH="aarch64"
          ABI="arm64-v8a"
          TERMUX_PREFIX="/data/data/com.termux/files/usr"
          BUILD_DIR="build_${DEB_ARCH}"
          STAGING_DIR="$(pwd)/termux_deb_staging_${DEB_ARCH}"
          
          echo "=> 正在配置 CMake (${DEB_ARCH})..."
          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="$ABI" \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_LIBS_ONLY=ON \
            -DLLVM_TARGETS_TO_BUILD="all" \
            -DCMAKE_INSTALL_PREFIX="$TERMUX_PREFIX"

          echo "=> 正在編譯..."
          ninja -C "$BUILD_DIR" -j$(nproc)

          echo "=> 提取與過濾檔案..."
          DESTDIR="$STAGING_DIR" ninja -C "$BUILD_DIR" install
          
          # 確保不包含 bin 與 share
          rm -rf "${STAGING_DIR}${TERMUX_PREFIX}/bin"
          rm -rf "${STAGING_DIR}${TERMUX_PREFIX}/share"
          # 確保只有靜態庫 .a
          if [ -d "${STAGING_DIR}${TERMUX_PREFIX}/lib" ]; then
             find "${STAGING_DIR}${TERMUX_PREFIX}/lib" -name "*.so*" -delete
          fi

          echo "=> 生成 DEBIAN control..."
          mkdir -p "$STAGING_DIR/DEBIAN"
          cat <<EOF > "$STAGING_DIR/DEBIAN/control"
          Package: libkeystone-dev
          Version: $VERSION
          Architecture: $DEB_ARCH
          Maintainer: GitHub Actions Builder
          Description: Lightweight multi-architecture assembly framework (Termux Static)
           Keystone static libraries and headers cross-compiled for Termux (arm64).
          EOF

          echo "=> 打包 DEB..."
          DEB_FILENAME="libkeystone-dev_${VERSION}_${DEB_ARCH}.deb"
          # 直接打包，不用再 mv 檔案，因為 dpkg-deb 已經會生在當前工作目錄了
          dpkg-deb --build "$STAGING_DIR" "$DEB_FILENAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystone-termux-deb-aarch64
          path: "*.deb"
          retention-days: 7
