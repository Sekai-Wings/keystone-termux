name: Build Termux Keystone DEB

# 設定觸發條件：推送代碼、發布 Release，或是手動觸發 (workflow_dispatch)
on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-termux:
    runs-on: ubuntu-latest
    
    # 透過 Matrix 一次性平行編譯三種常見的手機架構
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            deb_arch: aarch64
          - abi: armeabi-v7a
            deb_arch: arm
          - abi: x86_64
            deb_arch: x86_64

    steps:
      # 1. 取得 Keystone 官方最新原始碼 (如果你是放在自己的 fork，可以把 repository 參數刪掉)
      - name: Checkout Keystone Source
        uses: actions/checkout@v4
        with:
          repository: 'keystone-engine/keystone'
          submodules: recursive

      # 2. 安裝必要的編譯工具
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build dpkg

      # 3. 透過 Android NDK 進行 CMake 配置與 Ninja 交叉編譯
      - name: Build and Package DEB for ${{ matrix.deb_arch }}
        run: |
          VERSION="0.9.2"
          TERMUX_PREFIX="/data/data/com.termux/files/usr"
          BUILD_DIR="build_${{ matrix.deb_arch }}"
          STAGING_DIR="$(pwd)/termux_deb_staging_${{ matrix.deb_arch }}"
          
          echo "=> 正在配置 CMake (${{ matrix.deb_arch }})..."
          # 使用 GitHub Actions 內建的 ANDROID_NDK_LATEST_HOME 進行交叉編譯
          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_LIBS_ONLY=ON \
            -DLLVM_TARGETS_TO_BUILD="all" \
            -DCMAKE_INSTALL_PREFIX="$TERMUX_PREFIX"

          echo "=> 正在編譯..."
          ninja -C "$BUILD_DIR" -j$(nproc)

          echo "=> 提取與過濾檔案..."
          DESTDIR="$STAGING_DIR" ninja -C "$BUILD_DIR" install
          
          # 確保不包含 bin 與 share
          rm -rf "${STAGING_DIR}${TERMUX_PREFIX}/bin"
          rm -rf "${STAGING_DIR}${TERMUX_PREFIX}/share"
          # 確保只有靜態庫 .a
          if [ -d "${STAGING_DIR}${TERMUX_PREFIX}/lib" ]; then
             find "${STAGING_DIR}${TERMUX_PREFIX}/lib" -name "*.so*" -delete
          fi

          echo "=> 生成 DEBIAN control..."
          mkdir -p "$STAGING_DIR/DEBIAN"
          cat <<EOF > "$STAGING_DIR/DEBIAN/control"
          Package: libkeystone-dev
          Version: $VERSION
          Architecture: ${{ matrix.deb_arch }}
          Maintainer: GitHub Actions Builder
          Description: Lightweight multi-architecture assembly framework (Termux Static)
           Keystone static libraries and headers cross-compiled for Termux.
          EOF

          echo "=> 打包 DEB..."
          DEB_FILENAME="libkeystone-dev_${VERSION}_${{ matrix.deb_arch }}.deb"
          dpkg-deb --build "$STAGING_DIR" "$DEB_FILENAME"
          
          # 把檔案搬到 workspace 根目錄方便上傳
          mv "$DEB_FILENAME" libkeystone-dev_${VERSION}_${{ matrix.deb_arch }}.deb

      # 4. 上傳編譯好的 .deb 檔案到 GitHub Actions Artifacts
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystone-termux-deb-${{ matrix.deb_arch }}
          path: "*.deb"
          retention-days: 7
